# Mintz Construction Estimator - Spring Boot Configuration
spring.application.name=mintz-estimator

# PostgreSQL (Docker Compose service name = "db")
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:mintz_estimator}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:mintz123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
